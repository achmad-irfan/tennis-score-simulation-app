<div class="statistic">
  <h3>Match Statistic</h3>
  <table>
    <thead>
      <tr>
        <th>{{ p1 }}</th>
        <th>Statistic</th>
        <th>{{ p2 }}</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>{{ace1}}</td>
        <td>Ace</td>
        <td>{{ace2}}</td>
      </tr>
      <tr>
        <td>{{df1}}</td>
        <td>Double Fault</td>
        <td>{{df2}}</td>
      </tr>
      <tr>
        <td>{{winner1}}</td>
        <td>Winner</td>
        <td>{{winner2}}</td>
      </tr>
      <tr>
        <td>{{ue1}}</td>
        <td>Unforced Error</td>
        <td>{{ue2}}</td>
      </tr>
      <tr>
        <td>{{tp1}}</td>
        <td>Total point</td>
        <td>{{tp2}}</td>
      </tr>
    </tbody>
  </table>
</div>
