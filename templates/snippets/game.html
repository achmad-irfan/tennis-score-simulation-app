<!-- Set 1 -->
<div class="gameside">
    <p class="game {% if set_winner.0 == "p1" %}winner{% endif %}">{{sets1_p1}}</p>
    <p class="game {% if set_winner.0 == "p2" %}winner{% endif %}">{{sets1_p2}}</p>
    <p class="duration_point">{{duration_set1}}</p>
</div>
<!-- Set 2 -->
{% if current_set > 0 %}
<div class="gameside">
    <p class="game {% if set_winner.1 == "p1" %}winner{% endif %}">{{sets2_p1}}</p>
    <p class="game {% if set_winner.1 == "p2" %}winner{% endif %}">{{sets2_p2}}</p>
    <p class="duration_point">{{sets1_p2}}</p>
</div>
{% endif %} 
<!-- Set 3 -->
{% if current_set > 1 %}
<div class="gameside">
    <p class="game {% if set_winner.2 == "p1" %}winner{% endif %}">{{sets3_p1}}</p>
    <p class="game {% if set_winner.2 == "p2" %}winner{% endif %}">{{sets3_p2}}</p>
    <p class="duration_point">{{sets1_p2}}</p>
</div>
{% endif %}
