{% load static %}<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aplikasi Skor Tennis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body>
    <div class="app-container">
      <div class="tab-content">
        <h2>Tennis Score Application</h2>
        {% include 'snippets/_navtab.html' %}
        <div class="tab-pane fade show {% if active_tab == 'pick' %}show active{% endif %}" id="pick">{% include 'snippets/_pick_player.html' %}</div>

        <div class="tab-pane fade {% if active_tab == 'score' %}show active{% endif %}" id="score">{% include 'snippets/_score.html' %}</div>

        <div class="tab-pane fade {% if active_tab == 'stat' %}show active{% endif %}" id="stat">{% include 'snippets/_statistic.html' %}</div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="{% static 'js/main.js' %}"></script>
    <script src="{% static 'js/validation_point.js' %}"></script>
  </body>
</html>
